spring.application.name=order
server.port=8085
server.shutdown=GRACEFUL

orders.catelog-url=http://localhost:8081
orders.order-events-exchange=orders-exchange
orders.new-orders-queue=new-orders
orders.delivered-orders-queue=delivered-orders
orders.cancelled-orders-queue=cancelled-orders
orders.error-orders-queue=error-orders

management.endpoints.web.exposure.include=*
management.metrics.tags.application=${spring.application.name}
management.tracing.enabled=false
management.tracing.sampling.probability=1.0

orders.publish-order-event-job-cron=*/45 * * * * *
orders.new-orders-job-cron=*/30 * * * * *

swagger.api-gateway-url=http://localhost:8989/order

OAUTH2_SERVER_URL=http://localhost:9191
REALM_URL=${OAUTH2_SERVER_URL}/realms/bookstore
spring.security.oauth2.resourceserver.jwt.issuer-uri=${REALM_URL}

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:25432/postgres}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:1212}
spring.jpa.open-in-view=false

spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:1212}

resilience4j.retry.backends.catelog.max-attempts=2
resilience4j.retry.backends.catelog.wait-duration=1s

resilience4j.circuitbreaker.backends.catelog.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.backends.catelog.sliding-window-size=6
resilience4j.circuitbreaker.backends.catelog.minimum-number-of-calls=4
resilience4j.circuitbreaker.backends.catelog.wait-duration-in-open-state=20s
resilience4j.circuitbreaker.backends.catelog.permitted-number-of-calls-in-half-open-state=2
resilience4j.circuitbreaker.backends.catelog.failure-rate-threshold=50

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2