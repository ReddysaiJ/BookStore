name: 'bookstore-spring-boot'
services:
  catelog:
    image: reddysai21/bookstore-catelog
    container_name: catelog
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_URL=jdbc:postgresql://catelog-db:5432/postgres
      - DB_USERNAME=postgres
      - DB_PASSWORD=1212
      - MANAGEMENT_TRACING_ENABLED=true
      - MANAGEMENT_ZIPKIN_TRACING_ENDPOINT=http://tempo:9411/api/v2/spans
      - JAVA_TOOL_OPTIONS=-XX:MaxRAMPercentage=75.0 -XX:+UseZGC -XX:+ZGenerational -XX:ActiveProcessorCount=2 -Xss512k -XX:+ExitOnOutOfMemoryError
      - SERVER_TOMCAT_THREADS_MAX=50
      - SERVER_TOMCAT_THREADS_MIN_SPARE=10
      - SERVER_TOMCAT_ACCEPT_COUNT=100
      - SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE=10
      - SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE=2
      - SPRING_DATASOURCE_HIKARI_LEAK_DETECTION_THRESHOLD=60000
    ports:
      - "8081:8081"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "/busybox/wget", "-qO-", "http://localhost:8081/actuator/health" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    stop_grace_period: 30s
    depends_on:
      catelog-db:
        condition: service_healthy
      bookstore-rabbitmq:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 700m
          cpus: "2.0"
        reservations:
          memory: 400m
          cpus: "1.0"
    labels:
      logging: "promtail"

  order:
    image: reddysai21/bookstore-order
    container_name: order
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - ORDERS_CATELOG_URL=http://api-gateway:8989/catelog
      - DB_URL=jdbc:postgresql://orders-db:5432/postgres
      - DB_USERNAME=postgres
      - DB_PASSWORD=1212
      - RABBITMQ_HOST=bookstore-rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USERNAME=guest
      - RABBITMQ_PASSWORD=1212
      - OAUTH2_SERVER_URL=http://keycloak:9191
      - MANAGEMENT_TRACING_ENABLED=true
      - MANAGEMENT_ZIPKIN_TRACING_ENDPOINT=http://tempo:9411/api/v2/spans
      - JAVA_TOOL_OPTIONS=-XX:MaxRAMPercentage=75.0 -XX:+UseZGC -XX:+ZGenerational -XX:ActiveProcessorCount=2 -Xss512k -XX:+ExitOnOutOfMemoryError
      - SERVER_TOMCAT_THREADS_MAX=50
      - SERVER_TOMCAT_THREADS_MIN_SPARE=10
      - SERVER_TOMCAT_ACCEPT_COUNT=100
      - SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE=10
      - SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE=2
      - SPRING_DATASOURCE_HIKARI_LEAK_DETECTION_THRESHOLD=60000
    ports:
      - "8085:8085"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "/busybox/wget", "-qO-", "http://localhost:8085/actuator/health" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    stop_grace_period: 30s
    depends_on:
      orders-db:
        condition: service_healthy
      bookstore-rabbitmq:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 700m
          cpus: "2.0"
        reservations:
          memory: 400m
          cpus: "1.0"
    labels:
      logging: "promtail"

  notification:
    image: reddysai21/bookstore-notification
    container_name: notification
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_URL=jdbc:postgresql://notifications-db:5432/postgres
      - DB_USERNAME=postgres
      - DB_PASSWORD=1212
      - RABBITMQ_HOST=bookstore-rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USERNAME=guest
      - RABBITMQ_PASSWORD=1212
      - MAIL_HOST=mailhog
      - MAIL_PORT=1025
      - MANAGEMENT_TRACING_ENABLED=true
      - MANAGEMENT_ZIPKIN_TRACING_ENDPOINT=http://tempo:9411/api/v2/spans
      - JAVA_TOOL_OPTIONS=-XX:MaxRAMPercentage=75.0 -XX:+UseZGC -XX:+ZGenerational -XX:ActiveProcessorCount=1 -Xss512k -XX:+ExitOnOutOfMemoryError
      - SPRING_RABBITMQ_LISTENER_SIMPLE_CONCURRENCY=2
      - SPRING_RABBITMQ_LISTENER_SIMPLE_MAX_CONCURRENCY=5
      - SPRING_RABBITMQ_LISTENER_SIMPLE_PREFETCH=10
      - SERVER_TOMCAT_THREADS_MAX=30
      - SERVER_TOMCAT_THREADS_MIN_SPARE=5
      - SERVER_TOMCAT_ACCEPT_COUNT=100
      - SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE=10
      - SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE=2
      - SPRING_DATASOURCE_HIKARI_LEAK_DETECTION_THRESHOLD=60000
    ports:
      - "8087:8087"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "/busybox/wget", "-qO-", "http://localhost:8087/actuator/health" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    stop_grace_period: 30s
    depends_on:
      notifications-db:
        condition: service_healthy
      bookstore-rabbitmq:
        condition: service_healthy
      mailhog:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"
    labels:
      logging: "promtail"

  api-gateway:
    image: reddysai21/bookstore-api-gateway
    container_name: api-gateway
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - CATELOG_URL=http://catelog:8081
      - ORDER_URL=http://order:8085
      - MANAGEMENT_TRACING_ENABLED=true
      - MANAGEMENT_ZIPKIN_TRACING_ENDPOINT=http://tempo:9411/api/v2/spans
      - REACTOR_NETTY_IOWORKERCOUNT=4
      - REACTOR_NETTY_POOL_MAXCONNECTIONS=500
      - REACTOR_NETTY_POOL_MAXIDLETIME=20s
      - SPRING_LIFECYCLE_TIMEOUT_PER_SHUTDOWN_PHASE=20s
      - JAVA_TOOL_OPTIONS=-XX:MaxRAMPercentage=70.0 -XX:+UseZGC -XX:+ZGenerational -XX:ActiveProcessorCount=2 -Xss256k -XX:+ExitOnOutOfMemoryError
    ports:
      - "8989:8989"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "/busybox/wget", "-qO-", "http://localhost:8989/actuator/health" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    stop_grace_period: 30s
    depends_on:
      order:
        condition: service_healthy
      catelog:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "2.0"
        reservations:
          memory: 256m
          cpus: "1.0"
    labels:
      logging: "promtail"

  bookstore-webapp:
    image: reddysai21/bookstore-webapp
    container_name: bookstore-webapp
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - BOOKSTORE_API_GATEWAY_URL=http://api-gateway:8989
      - OAUTH2_SERVER_URL=http://keycloak:9191
      - MANAGEMENT_TRACING_ENABLED=true
      - MANAGEMENT_ZIPKIN_TRACING_ENDPOINT=http://tempo:9411/api/v2/spans
      - JAVA_TOOL_OPTIONS=-XX:MaxRAMPercentage=75.0 -XX:+UseZGC -XX:+ZGenerational -XX:ActiveProcessorCount=2 -Xss512k -XX:+ExitOnOutOfMemoryError
      - SERVER_TOMCAT_THREADS_MAX=50
      - SERVER_TOMCAT_THREADS_MIN_SPARE=10
      - SERVER_TOMCAT_ACCEPT_COUNT=100
      - SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE=10
      - SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE=2
      - SPRING_DATASOURCE_HIKARI_LEAK_DETECTION_THRESHOLD=60000
    ports:
      - "8080:8080"
    depends_on:
      api-gateway:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "/busybox/wget", "-qO-", "http://localhost:8080/actuator/health" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          memory: 700m
          cpus: "2.0"
        reservations:
          memory: 400m
          cpus: "1.0"
    labels:
      logging: "promtail"